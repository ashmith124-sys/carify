<!-- Cart Drawer Component -->
<div id="cartDrawer" class="cart-drawer glass-panel" style="border-radius: 0; border: none; border-left: 1px solid var(--border-subtle);">
    <div class="cart-header">
        <h3 class="cart-title font-heading">YOUR SELECTION</h3>
        <button id="closeCart" class="btn-close-cart"><i class="fas fa-times"></i></button>
    </div>

    <div id="cartItems" class="cart-body">
        <!-- Cart items will be loaded via AJAX -->
        <div style="text-align: center; padding: 100px 0; opacity: 0.7;">
            <i class="fas fa-shopping-bag" style="font-size: 2.5rem; margin-bottom: 25px; color: var(--border-elegant);"></i>
            <p class="font-heading" style="font-size: 0.85rem; letter-spacing: 0.15em; margin-bottom: 15px;">YOUR SELECTION IS EMPTY</p>
            <p class="font-serif" style="font-size: 0.9rem; color: var(--text-muted); font-style: italic;">Curate your preservation protocol.</p>
            <a href="{% url 'carify_app:product_list' %}" class="btn btn-outline" style="margin-top: 30px; font-size: 0.65rem;">EXPLORE COLLECTION</a>
        </div>
    </div>
    
    <div id="savedItemsSection" style="display: none; border-top: 1px dashed var(--border-subtle); padding-top: 20px; margin-bottom: 20px;">
        <h4 class="font-heading" style="font-size: 0.75rem; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 15px;">SAVED FOR LATER</h4>
        <div id="savedItems" class="cart-scroll-section" style="max-height: 250px; overflow-y: auto;"></div>
    </div>

    <div class="cart-footer">
        <div class="cart-total-row">
            <span class="font-heading" style="font-size: 0.7rem; letter-spacing: 0.1em;">SUBTOTAL</span>
            <span id="cartSubtotal" class="cart-val font-heading">$0.00</span>
        </div>
        <div class="cart-total-row final-total">
            <span class="font-heading" style="font-size: 1rem; letter-spacing: 0.1em;">TOTAL</span>
            <span id="cartTotal" class="cart-val font-heading copper-text">$0.00</span>
        </div>
        
        <div class="cart-actions" style="margin-top: 30px; display: grid; gap: 15px;">
            <button id="checkoutBtn" class="btn btn-primary" style="width: 100%; height: 60px;">SECURE CHECKOUT</button>
        </div>
    </div>
</div>

<style>
.cart-drawer {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    height: 100vh;
    z-index: 2100;
    transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1); /* Smoother, Shopify-esque slide */
    display: flex;
    flex-direction: column;
    padding: 40px 24px;
    box-shadow: -20px 0 50px rgba(0,0,0,0.8);
    background: var(--obsidian); /* solid background for better contrast */
}

@media (min-width: 768px) {
    .cart-drawer {
        width: 450px;
        right: -450px;
        padding: 50px 40px;
    }
}

.cart-drawer.active {
    right: 0;
}

.cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-subtle);
}

.cart-title {
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    font-weight: 600;
    color: var(--text-pure);
}

.btn-close-cart {
    background: none;
    border: none;
    color: var(--text-pure);
    font-size: 1.4rem;
    cursor: pointer;
    opacity: 0.5;
    transition: 0.3s;
}

.btn-close-cart:hover {
    opacity: 1;
    transform: rotate(90deg);
}

.cart-body {
    flex-grow: 1;
    overflow-y: auto;
    margin-bottom: 30px;
    scrollbar-width: none;
}

.cart-body::-webkit-scrollbar { display: none; }

.cart-footer {
    border-top: 1px solid var(--border-subtle);
    padding-top: 25px;
}

.cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    color: var(--text-muted);
}

.cart-val {
    color: var(--text-pure);
}

.final-total {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border-subtle);
}
</style>
