{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Carify{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="{% url 'carify_app:home' %}">Carify</a>
            <nav class="site-nav">
                <a href="{% url 'carify_app:home' %}">Home</a>
                <a href="{% url 'carify_app:product_list' %}">Products</a>
                <a href="/accounts/login/">Login</a>
                <a href="/accounts/signup/" class="button">Sign up</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>Carify &copy; {% now "Y" %}. Premium automotive accessories for every driver.</p>
        </div>
    </footer>
</body>
</html>
