{% extends 'base.html' %}
{% block title %}Payment Cancelled | Carify{% endblock %}

{% block content %}
<div class="section" style="background: var(--bg-surface); min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center;">
    <div class="container" style="max-width: 600px; background: var(--bg-main); border: 2px solid var(--border-strong); padding: 60px; border-radius: 4px;">
        <div style="font-size: 5rem; color: #ef4444; margin-bottom: 30px;">
            <i class="fas fa-times-circle"></i>
        </div>
        <h1 style="font-size: 3rem; margin-bottom: 15px;">PAYMENT CANCELLED</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; line-height: 1.6;">
            Transaction aborted. The payment session was terminated. Your cart items are still reserved for a limited time.
        </p>
        <div style="display: flex; gap: 20px; justify-content: center;">
            <a href="{% url 'carify_app:product_list' %}" class="btn btn-primary" style="padding: 15px 40px;">RETURN TO CATALOG</a>
            <a href="/" class="btn btn-outline" style="padding: 15px 40px; border: 1px solid var(--border-strong);">GO HOME</a>
        </div>
    </div>
</div>
{% endblock %}
